<!DOCTYPE html>
<html>
<head>
    <title>Guest Registration</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .form-container { max-width: 400px; background: white; padding: 20px; border: 1px solid #ccc; }
        button { background: #27ae60; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Register New Guest</h1>
    <div class="form-container">
        <form method="POST">
            {% csrf_token %} {{ form.as_p }}
            <button type="submit">Save Guest</button>
        </form>
    </div>
    <br>
    <div style="margin-top: 20px;">
        <a href="{% url 'home' %}" style="color: #7f8c8d; text-decoration: none;">
            ← Cancel and return to Dashboard
        </a>
    </div>
</body>
</html>
